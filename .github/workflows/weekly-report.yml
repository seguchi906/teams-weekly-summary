name: 週次 Teams レポート送信

on:
  # 毎週月曜 09:00 JST (= UTC 00:00) に自動実行
  schedule:
    - cron: "0 0 * * 1"
  # GitHub 画面から手動実行も可能
  workflow_dispatch:

# actions/deploy-pages に必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  report:
    runs-on: ubuntu-latest

    # GitHub Pages デプロイ先 URL を environment として紐づける
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ─────────────────────────────────────────
      # 1. リポジトリのチェックアウト
      # ─────────────────────────────────────────
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Node.js のセットアップ
      # ─────────────────────────────────────────
      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      # ─────────────────────────────────────────
      # 3. npm パッケージのインストール
      # ─────────────────────────────────────────
      - name: npm パッケージをインストール
        run: npm ci

      # ─────────────────────────────────────────
      # 4. Playwright ブラウザ（Chromium）のインストール
      # ─────────────────────────────────────────
      - name: Playwright ブラウザをインストール
        run: npx playwright install --with-deps chromium

      # ─────────────────────────────────────────
      # 5. レポート生成・Teams 通知送信
      #    generate-report.mjs が以下を行う:
      #      - overall-project-schedule API からデータ取得・集計
      #      - Neon DB から進捗率を取得しジョイン
      #      - HTML テンプレートにデータを埋め込む
      #      - Playwright でスクリーンショット撮影
      #      - Teams Incoming Webhook に Adaptive Card 送信
      # ─────────────────────────────────────────
      - name: レポートを生成して Teams に送信
        run: node scripts/generate-report.mjs
        env:
          OVERALL_PROJECT_SCHEDULE_URL: ${{ secrets.OVERALL_PROJECT_SCHEDULE }}
          PROGRESS_BASHBOARD_URL: ${{ secrets.PROGRESS_BASHBOARD }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          PAGES_BASE_URL: https://seguchi906.github.io/teams-weekly-summary

      # ─────────────────────────────────────────
      # 6. dist フォルダを GitHub Pages アーティファクトとしてアップロード
      #    → report-YYYYMMDD-<ms>.png と report-latest.png（Teams はタイムスタンプ PNG + ?v= を使用）
      # ─────────────────────────────────────────
      - name: GitHub Pages アーティファクトをアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      # ─────────────────────────────────────────
      # 7. GitHub Pages にデプロイ
      # ─────────────────────────────────────────
      - name: GitHub Pages にデプロイ
        id: deployment
        uses: actions/deploy-pages@v4

      # ─────────────────────────────────────────
      # 8. 生成ファイルをアーティファクトとして保存（デバッグ用）
      # ─────────────────────────────────────────
      - name: アーティファクトを保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report
          path: dist/
          retention-days: 30
