name: 週次 Teams レポート送信

on:
  # 毎週月曜 09:00 JST (= UTC 00:00) に自動実行
  schedule:
    - cron: "0 0 * * 1"
  # GitHub 画面から手動実行も可能
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────
      # 1. リポジトリのチェックアウト
      # ─────────────────────────────────────────
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Node.js のセットアップ
      # ─────────────────────────────────────────
      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      # ─────────────────────────────────────────
      # 3. npm パッケージのインストール
      # ─────────────────────────────────────────
      - name: npm パッケージをインストール
        run: npm ci

      # ─────────────────────────────────────────
      # 4. Playwright ブラウザ（Chromium）のインストール
      # ─────────────────────────────────────────
      - name: Playwright ブラウザをインストール
        run: npx playwright install --with-deps chromium

      # ─────────────────────────────────────────
      # 5. レポート生成・Teams 投稿
      #    generate-report.mjs が以下を行う:
      #      - Neon DB からデータ取得・集計
      #      - HTML テンプレートにデータを埋め込む
      #      - Playwright でスクリーンショット撮影
      #      - Graph API で Teams チャンネルに直接投稿
      # ─────────────────────────────────────────
      - name: レポートを生成して Teams に投稿
        run: node scripts/generate-report.mjs
        env:
          DATABASE_URL: ${{ secrets.OVERALL_PROJECT_SCHEDULE }}
          PROGRESS_BASHBOARD_URL: ${{ secrets.PROGRESS_BASHBOARD }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          TEAMS_TEAM_ID: ${{ secrets.TEAMS_TEAM_ID }}
          TEAMS_CHANNEL_ID: ${{ secrets.TEAMS_CHANNEL_ID }}

      # ─────────────────────────────────────────
      # 6. 生成ファイルをアーティファクトとして保存（デバッグ用）
      # ─────────────────────────────────────────
      - name: アーティファクトを保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report
          path: dist/
          retention-days: 30
