name: AI提案テスト

on:
  workflow_dispatch:

jobs:
  ai-test:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v4

      - name: Nodeセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: 依存インストール
        run: npm ci

      - name: Playwrightブラウザ導入
        run: npx playwright install --with-deps chromium

      # generate-report.mjs: 週次サマリー → リスク詳細 →（設定時）AI 提案カードの順で Teams に送信
      - name: レポート生成と Teams 送信
        run: node scripts/generate-report.mjs
        env:
          OVERALL_PROJECT_SCHEDULE_URL: ${{ secrets.OVERALL_PROJECT_SCHEDULE }}
          PROGRESS_BASHBOARD_URL: ${{ secrets.PROGRESS_BASHBOARD }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          TEAMS_RISK_WEBHOOK_URL: ${{ secrets.TEAMS_RISK_WEBHOOK_URL }}
          TEAMS_AI_WEBHOOK_URL: ${{ secrets.TEAMS_AI_REPORT_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PAGES_BASE_URL: https://seguchi906.github.io/teams-weekly-summary
